<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Primary gradient: cyber blue to deep purple -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Secondary gradient for depth -->
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background shield shape -->
  <path d="M256 32
           C256 32 80 80 80 200
           C80 340 256 480 256 480
           C256 480 432 340 432 200
           C432 80 256 32 256 32Z"
        fill="url(#shieldGradient)"/>

  <!-- Inner shield highlight -->
  <path d="M256 55
           C256 55 105 95 105 200
           C105 320 256 445 256 445
           C256 445 407 320 407 200
           C407 95 256 55 256 55Z"
        fill="none" stroke="url(#innerGradient)" stroke-width="2" opacity="0.5"/>

  <!-- The Letter B - modern geometric style -->
  <g transform="translate(256, 265)" fill="#FFFFFF">
    <!-- Left vertical bar of B -->
    <rect x="-65" y="-90" width="20" height="180" rx="4"/>

    <!-- Top horizontal curve -->
    <path d="M-55 -90
             L-15 -90
             C35 -90 70 -70 70 -40
             C70 -10 35 10 -15 10
             L-45 10"
          fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>

    <!-- Bottom horizontal curve -->
    <path d="M-45 10
             L5 10
             C55 10 90 30 90 65
             C90 100 55 120 5 120
             L-55 120"
          fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"/>

    <!-- Connection point dot (representing SSO node) -->
    <circle cx="45" cy="-15" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Behavioral signal waves (top right) -->
  <g opacity="0.7">
    <path d="M340 110 Q360 90 380 110 T420 110" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M350 130 Q370 110 390 130 T430 130" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M360 150 Q380 130 400 150 T440 150" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Bottom left signal nodes -->
  <circle cx="140" cy="360" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="170" cy="380" r="4" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="125" cy="330" r="3" fill="#FFFFFF" opacity="0.4"/>

  <!-- Connection line between nodes -->
  <line x1="140" y1="360" x2="170" y2="380" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
  <line x1="140" y1="360" x2="125" y2="330" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>
</svg>