<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; form-action 'self'; base-uri 'none';">
  <title>Reset Password — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">

      <a href="/login" class="nav-back" aria-label="Back to sign in">
        <span class="nav-back-arrow" aria-hidden="true">←</span>
        Back to sign in
      </a>

      <div class="brand-row" data-stagger>
        <div class="brand-logo" aria-hidden="true"><i class="fas fa-car"></i></div>
        <span class="brand-name">CARS SSO</span>
      </div>

      <span class="page-icon" aria-hidden="true" data-stagger><i class="fas fa-key"></i></span>
      <h1 class="page-title" data-stagger>Forgot your <em>password?</em></h1>
      <p class="page-subtitle" data-stagger>Enter your email and we'll send a secure reset link. Expires in 1 hour.</p>

      <div id="status-box" class="status-box" role="status" aria-live="polite" aria-atomic="true" data-stagger></div>

      <form id="forgot-form" novalidate data-stagger>
        <div class="field">
          <label for="reset-email">Email Address</label>
          <input type="email" id="reset-email" name="email"
            placeholder="you@example.com"
            autocomplete="email" maxlength="254"
            required aria-required="true" aria-describedby="status-box">
        </div>

        <button type="submit" id="forgot-btn" class="btn-primary">Send Reset Link</button>
      </form>

      <div class="footer-link footer-link--center" data-stagger>
        Remember it now? <a href="/login">Sign in</a>
      </div>

    </div>
  </div>
  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
