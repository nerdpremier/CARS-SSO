<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Reset Password — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="split-layout">

    <!-- ── Brand panel ── -->
    <aside class="brand-panel" aria-hidden="true">
      <div class="brand-glow-a"></div>
      <div class="brand-glow-b"></div>

      <div class="brand-top">
        <div class="brand-wordmark">
          <div class="brand-icon">🚗</div>
          <span class="brand-name-text">CARS SSO</span>
        </div>
        <h2 class="brand-headline">Forgot your<br><em>password?</em></h2>
        <p class="brand-description">
          No problem. Enter your email address and we'll send you a secure
          link to reset your password. The link expires after 1 hour.
        </p>
      </div>

      <div class="brand-bottom">
        <div class="brand-badges">
          <div class="brand-badge"><div class="badge-dot"></div>Link expires in 1 hr</div>
          <div class="brand-badge"><div class="badge-dot"></div>Secure reset</div>
        </div>
      </div>
    </aside>

    <!-- ── Form panel ── -->
    <main class="form-panel">
      <div class="form-container">
        <div class="form-card">

          <div class="form-icon" aria-hidden="true">🗝️</div>
          <h1 class="form-title">Reset your password</h1>
          <p class="form-subtitle">We'll email you a link to set a new password</p>

          <div id="status-box" class="status-box" role="status" aria-live="polite" aria-atomic="true"></div>

          <form id="forgot-form" novalidate>
            <div class="field">
              <label for="reset-email">Email Address</label>
              <div class="input-wrap">
                <input type="email" id="reset-email" name="email"
                  placeholder="you@example.com"
                  autocomplete="email" maxlength="254"
                  required aria-required="true" aria-describedby="status-box">
              </div>
            </div>

            <button type="submit" id="forgot-btn" class="btn-primary">Send Reset Link</button>
          </form>

          <div class="footer-link" style="text-align:center;">
            <a href="/login">← Back to sign in</a>
          </div>

        </div>
      </div>
    </main>

  </div>

  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
