<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Reset Password — B-SSO</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">

      <a href="/login" class="nav-back" id="back-link" aria-label="Back to sign in">
        <span class="nav-back-arrow" aria-hidden="true">←</span>
        Back to sign in
      </a>

      <span class="page-icon" aria-hidden="true" data-stagger>B</span>
      <h1 class="page-title" data-stagger>Forgot your <em>password?</em></h1>
      <p class="page-subtitle" data-stagger>Enter your email and we'll send a secure reset link. Expires in 1 hour.</p>

      <div id="status-box" class="status-box" role="status" aria-live="polite" aria-atomic="true" data-stagger></div>

      <form id="forgot-form" novalidate data-stagger>
        <div class="field">
          <label for="reset-email">Email Address</label>
          <input type="email" id="reset-email" name="email"
            placeholder="you@example.com"
            autocomplete="email" maxlength="254"
            required aria-required="true" aria-describedby="status-box">
        </div>

        <button type="submit" id="forgot-btn" class="btn-primary">Send Reset Link</button>
      </form>

      <div class="footer-link footer-link--center" data-stagger>
        Remember it now? <a href="/login" id="login-link">Sign in</a>
      </div>

    </div>
  </div>
  <script>
    // เพิ่ม OAuth params ให้ login links
    (function() {
      const sp = new URLSearchParams(window.location.search);
      const next = sp.get('next');
      const redirectBack = sp.get('redirect_back');
      if (next || redirectBack) {
        const loginUrl = new URL('/login', window.location.origin);
        if (next) loginUrl.searchParams.set('next', next);
        if (redirectBack) loginUrl.searchParams.set('redirect_back', redirectBack);
        const newHref = loginUrl.toString();
        
        const backLink = document.getElementById('back-link');
        if (backLink) backLink.href = newHref;
        
        const loginLink = document.getElementById('login-link');
        if (loginLink) loginLink.href = newHref;
      }
    })();
  </script>
  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
