<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Reset Password — CARS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="particles"></div>
  <div class="card">
    <div class="card-glow"></div>
    <div class="emblem" aria-hidden="true">
      <div class="emblem-ring"></div>
      <div class="emblem-bg">🗝️</div>
    </div>
    <h1 class="heading">Reset Password</h1>
    <p class="subtitle">Enter your email and we&apos;ll send a reset link</p>

    <div id="status-box" class="status-box" role="status" aria-live="polite" aria-atomic="true"></div>

    <form id="forgot-form" novalidate>
      <div class="field">
        <label for="reset-email">Email Address</label>
        <input type="email" id="reset-email" name="email" placeholder="your@email.com"
          autocomplete="email" maxlength="254" required aria-required="true" aria-describedby="status-box">
      </div>
      <button type="submit" id="forgot-btn" class="btn-primary">Send Reset Link</button>
    </form>

    <div class="footer-link">
      <a href="/login">Back to sign in</a>
    </div>
  </div>
  <script src="effects.js"></script>
  <script src="script.js"></script>
</body>
</html>
