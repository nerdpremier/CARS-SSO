<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; form-action 'self'; base-uri 'none';">
  <title>Signing out — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">
      <div class="brand-row" data-stagger>
        <div class="brand-logo" aria-hidden="true"><i class="fas fa-car"></i></div>
        <span class="brand-name">CARS SSO</span>
      </div>

      <span class="page-icon" aria-hidden="true" data-stagger><i class="fas fa-sign-out-alt"></i></span>
      <h1 class="page-title" data-stagger>Signing out…</h1>
      <p class="page-subtitle" data-stagger>Please wait a moment.</p>

      <div id="status-box" class="status-box loading" role="alert" aria-live="assertive" aria-atomic="true" data-stagger>
        Logging you out securely…
      </div>
    </div>
  </div>

  <script src="/effects.js"></script>
  <script src="/front-logout.js"></script>
</body>
</html>
