<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Sign In — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="split-layout">

    <!-- ── Brand panel ── -->
    <aside class="brand-panel" aria-hidden="true">
      <div class="brand-glow-a"></div>
      <div class="brand-glow-b"></div>

      <div class="brand-top">
        <div class="brand-wordmark">
          <div class="brand-icon">🚗</div>
          <span class="brand-name-text">CARS SSO</span>
        </div>
        <h2 class="brand-headline">One account,<br><em>unlimited access.</em></h2>
        <p class="brand-description">
          Secure single sign-on for the CARS ecosystem — built with
          adaptive MFA, OAuth 2.0, and developer-first APIs.
        </p>
      </div>

      <div class="brand-bottom">
        <div class="brand-badges">
          <div class="brand-badge"><div class="badge-dot"></div>Adaptive MFA</div>
          <div class="brand-badge"><div class="badge-dot"></div>OAuth 2.0</div>
          <div class="brand-badge"><div class="badge-dot"></div>Zero Trust</div>
        </div>
      </div>
    </aside>

    <!-- ── Form panel ── -->
    <main class="form-panel">
      <div class="form-container">
        <div class="form-card">

          <div class="form-icon" aria-hidden="true">👤</div>
          <h1 class="form-title">Welcome back</h1>
          <p class="form-subtitle">Sign in to your CARS account</p>

          <div id="status-box" class="status-box" role="status" aria-live="polite" aria-atomic="true"></div>

          <form id="login-form" novalidate>
            <div class="field">
              <label for="username">Username</label>
              <div class="input-wrap">
                <input type="text" id="username" name="username"
                  placeholder="Enter your username"
                  autocomplete="username" maxlength="32"
                  required aria-required="true" aria-describedby="status-box">
              </div>
            </div>

            <div class="field">
              <label for="password">Password</label>
              <div class="input-wrap">
                <input type="password" id="password" name="password"
                  placeholder="Enter your password"
                  autocomplete="current-password" maxlength="128"
                  required aria-required="true" aria-describedby="status-box">
              </div>
            </div>

            <div class="checkbox-group">
              <input type="checkbox" id="remember-device" name="remember-device">
              <label for="remember-device">Remember this device for 30 days</label>
            </div>

            <button type="submit" id="login-btn" class="btn-primary">Sign In</button>
          </form>

          <div class="footer-link footer-link-row">
            <a href="/forgot-password">Forgot password?</a>
            <a href="/register">Create account</a>
          </div>

        </div>
      </div>
    </main>

  </div>

  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
