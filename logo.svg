<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- Cyber Security Gradients -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312E81" /> <!-- Deep Security Purple -->
      <stop offset="45%" stop-color="#4F46E5" /> <!-- Vibrant Indigo -->
      <stop offset="100%" stop-color="#0284C7" /> <!-- Cyber Blue -->
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>
    <!-- Inner Glow for Shield Edge -->
    <linearGradient id="shieldEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>
    <!-- Node Glow Filter -->
    <filter id="nodeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Modern Shield Base -->
  <path d="M128 16 C184 16 226 36 226 36 L226 104 C226 186 142 236 128 244 C114 236 30 186 30 104 L30 36 C30 36 72 16 128 16 Z" fill="url(#shieldGrad)"/>
  <path d="M128 16 C184 16 226 36 226 36 L226 104 C226 186 142 236 128 244 C114 236 30 186 30 104 L30 36 C30 36 72 16 128 16 Z" fill="none" stroke="url(#shieldEdge)" stroke-width="2"/>
  
  <!-- Subtle Internal Grid/Circuit representing Cyber Infrastructure -->
  <g stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="2">
    <path d="M128 36 L128 220" />
    <path d="M50 104 L206 104" />
    <path d="M70 60 L186 160" />
    <path d="M70 160 L186 60" />
  </g>

  <!-- The "B" Core Element: Digital lines + Node Connections -->
  <g transform="translate(4, -4)">
    <!-- Vertical Signal Line (Stem of the B) -->
    <line x1="96" y1="74" x2="96" y2="182" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
    
    <!-- Top Loop (Auth/Access) -->
    <path d="M96 74 L138 74 C164 74 180 86 180 108 C180 130 164 142 138 142 L96 142" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Bottom Loop (AI/Intelligence) -->
    <path d="M96 134 L146 134 C176 134 192 148 192 174 C192 200 176 214 146 214 L96 214" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Emitting Nodes with Glow -->
    <g filter="url(#nodeGlow)">
      <!-- Start/End Nodes on the stem -->
      <circle cx="96" cy="74" r="9" fill="#38BDF8"/>
      <circle cx="96" cy="214" r="9" fill="#38BDF8"/>
      
      <!-- Checkpoint Nodes on the loops -->
      <circle cx="180" cy="108" r="7" fill="#A78BFA"/>
      <circle cx="192" cy="174" r="7" fill="#A78BFA"/>
      <circle cx="138" cy="142" r="5" fill="#FFFFFF"/>
    </g>

    <!-- Behavioral Intelligence Wave (Intersecting the B) -->
    <path d="M60 142 Q110 80 140 142 T220 120" fill="none" stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 8"/>
  </g>
</svg>
