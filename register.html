<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; form-action 'self'; base-uri 'none';">
  <title>Create Account — B-SSO</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">

      <a href="/login" class="nav-back" id="back-link" aria-label="Back to sign in">
        <span class="nav-back-arrow" aria-hidden="true">←</span>
        Back to sign in
      </a>

      <div class="brand-row" data-stagger>
        <span class="brand-name">B-SSO</span>
      </div>
      <h1 class="page-title" data-stagger>Start <em>building</em></h1>
      <p class="page-subtitle" data-stagger>Create your account and join the B-SSO ecosystem</p>

      <div id="status-box" class="status-box" role="status" aria-live="polite" aria-atomic="true" data-stagger></div>

      <form id="register-form" novalidate data-stagger>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
            placeholder="Letters and numbers only"
            autocomplete="username"
            pattern="[A-Za-z0-9]+" maxlength="32"
            required aria-required="true">
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email"
            placeholder="you@example.com"
            autocomplete="email" maxlength="254"
            required aria-required="true">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
            placeholder="Create a strong password"
            autocomplete="new-password" maxlength="128"
            required aria-required="true" aria-describedby="password-rules">
        </div>

        <ul id="password-rules" class="password-rules" aria-label="Password requirements" aria-live="polite">
          <li class="rule" id="rule-length"  role="listitem" aria-label="Not met: At least 8 characters">8+ characters</li>
          <li class="rule" id="rule-upper"   role="listitem" aria-label="Not met: Uppercase letter">Uppercase (A–Z)</li>
          <li class="rule" id="rule-lower"   role="listitem" aria-label="Not met: Lowercase letter">Lowercase (a–z)</li>
          <li class="rule" id="rule-number"  role="listitem" aria-label="Not met: Number">Number (0–9)</li>
          <li class="rule" id="rule-special" role="listitem" aria-label="Not met: Symbol">Symbol (@$!%*?&amp;)</li>
        </ul>

        <button type="submit" id="register-btn" class="btn-primary">Create Account</button>
      </form>

      <div class="footer-link footer-link--center" data-stagger>
        Already have an account? <a href="/login" id="login-link">Sign in</a>
      </div>

    </div>
  </div>
  <script>
    // เพิ่ม OAuth params ให้ login links
    (function() {
      const sp = new URLSearchParams(window.location.search);
      const next = sp.get('next');
      const redirectBack = sp.get('redirect_back');
      if (next || redirectBack) {
        const loginUrl = new URL('/login', window.location.origin);
        if (next) loginUrl.searchParams.set('next', next);
        if (redirectBack) loginUrl.searchParams.set('redirect_back', redirectBack);
        const newHref = loginUrl.toString();
        
        // Update back link
        const backLink = document.getElementById('back-link');
        if (backLink) backLink.href = newHref;
        
        // Update login link
        const loginLink = document.getElementById('login-link');
        if (loginLink) loginLink.href = newHref;
      }
    })();
  </script>
  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
