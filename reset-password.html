<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; form-action 'self'; base-uri 'none';">
  <title>New Password — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">

      <a href="/login" class="nav-back" aria-label="Back to sign in">
        <span class="nav-back-arrow" aria-hidden="true">←</span>
        Back to sign in
      </a>

      <div class="brand-row" data-stagger>
        <div class="brand-logo" aria-hidden="true"><i class="fas fa-car"></i></div>
        <span class="brand-name">CARS SSO</span>
      </div>

      <span class="page-icon" aria-hidden="true" data-stagger><i class="fas fa-key"></i></span>
      <h1 class="page-title" data-stagger>Set a new <em>password</em></h1>
      <p class="page-subtitle" data-stagger>Choose something strong. All active sessions will be signed out.</p>

      <div id="status-box" class="status-box" role="alert" aria-live="assertive" aria-atomic="true" data-stagger></div>

      <form id="reset-form" novalidate data-stagger>
        <div class="field">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" name="new-password"
            placeholder="Enter new password"
            autocomplete="new-password" maxlength="128"
            required aria-required="true" aria-describedby="password-rules">
        </div>

        <ul id="password-rules" class="password-rules" aria-label="Password requirements" aria-live="polite">
          <li class="rule" id="rule-length"  aria-label="Not met: At least 8 characters">
            <span class="rule-icon" aria-hidden="true"><i class="fas fa-times"></i></span> 8+ characters
          </li>
          <li class="rule" id="rule-upper"   aria-label="Not met: Uppercase letter">
            <span class="rule-icon" aria-hidden="true"><i class="fas fa-times"></i></span> Uppercase (A–Z)
          </li>
          <li class="rule" id="rule-lower"   aria-label="Not met: Lowercase letter">
            <span class="rule-icon" aria-hidden="true"><i class="fas fa-times"></i></span> Lowercase (a–z)
          </li>
          <li class="rule" id="rule-number"  aria-label="Not met: Number">
            <span class="rule-icon" aria-hidden="true"><i class="fas fa-times"></i></span> Number (0–9)
          </li>
          <li class="rule" id="rule-special" aria-label="Not met: Symbol">
            <span class="rule-icon" aria-hidden="true"><i class="fas fa-times"></i></span> Symbol (@$!%*?&amp;)
          </li>
        </ul>

        <div class="field">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password"
            placeholder="Re-enter your new password"
            autocomplete="new-password" maxlength="128"
            required aria-required="true" aria-describedby="confirm-hint">
        </div>
        <p id="confirm-hint" class="input-hint">Must match the password above</p>

        <button type="submit" id="reset-btn" class="btn-primary">Save New Password</button>
      </form>

    </div>
  </div>
  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
