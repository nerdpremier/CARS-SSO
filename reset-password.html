<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>New Password — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="particles"></div>

  <div class="card">
    <div class="card-glow"></div>

    <div class="emblem" aria-hidden="true">
      <div class="emblem-ring"></div>
      <div class="emblem-bg">🔐</div>
    </div>

    <h1 class="heading">Set new password</h1>
    <p class="subtitle">Choose a strong password for your account</p>

    <div id="status-box" class="status-box" role="alert" aria-live="assertive" aria-atomic="true"></div>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="new-password">New Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="new-password"
            name="new-password"
            placeholder="Enter new password"
            autocomplete="new-password"
            maxlength="128"
            required
            aria-required="true"
            aria-describedby="password-rules status-box"
          >
        </div>
      </div>

      <ul id="password-rules" class="password-rules" aria-label="Password requirements" aria-live="polite">
        <li class="rule" id="rule-length"  aria-label="Not met: At least 8 characters">
          <span class="rule-icon" aria-hidden="true">✗</span> 8+ characters
        </li>
        <li class="rule" id="rule-upper"   aria-label="Not met: Uppercase letter">
          <span class="rule-icon" aria-hidden="true">✗</span> Uppercase (A–Z)
        </li>
        <li class="rule" id="rule-lower"   aria-label="Not met: Lowercase letter">
          <span class="rule-icon" aria-hidden="true">✗</span> Lowercase (a–z)
        </li>
        <li class="rule" id="rule-number"  aria-label="Not met: Number">
          <span class="rule-icon" aria-hidden="true">✗</span> Number (0–9)
        </li>
        <li class="rule" id="rule-special" aria-label="Not met: Symbol">
          <span class="rule-icon" aria-hidden="true">✗</span> Symbol (@$!%*?&amp;)
        </li>
      </ul>

      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="Re-enter your new password"
            autocomplete="new-password"
            maxlength="128"
            required
            aria-required="true"
            aria-describedby="confirm-hint status-box"
          >
        </div>
      </div>
      <p id="confirm-hint" class="input-hint">Must match the password above</p>

      <button type="submit" id="reset-btn" class="btn-primary">Save New Password</button>
    </form>

    <div class="footer-link" style="text-align:center;">
      <a href="/login">Cancel and return to sign in</a>
    </div>
  </div>

  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
