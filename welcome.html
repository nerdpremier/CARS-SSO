<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Welcome — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Welcome-specific styles */
    .welcome-success-icon {
      width: 64px; height: 64px;
      background: var(--ok-bg);
      border: 2px solid var(--ok-bd);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
    }

    .session-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--ok-bg);
      border: 1.5px solid var(--ok-bd);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12.5px; font-weight: 700; color: #065F46;
      margin-bottom: 14px;
    }
    .session-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 5px var(--ok);
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity: 1; } 50% { opacity: .45; }
    }

    .welcome-name {
      font-size: 14px; color: var(--muted);
      margin-bottom: 24px;
    }
    .welcome-name strong {
      font-weight: 800;
      color: var(--accent);
    }

    .welcome-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 4px 0 16px;
      color: var(--dim); font-size: 11.5px; font-weight: 600;
      letter-spacing: .3px; text-transform: uppercase;
    }
    .welcome-divider::before,
    .welcome-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-signout {
      display: block; width: 100%;
      padding: 12px 20px;
      border: 1.5px solid var(--border); border-radius: var(--radius-btn);
      background: var(--white); color: var(--muted);
      font-family: var(--font); font-size: 14.5px; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: border-color .18s, color .18s, background .18s;
      margin-top: 10px;
    }
    .btn-signout:hover {
      border-color: var(--err-bd); color: var(--err); background: var(--err-bg);
    }
    .btn-signout:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(224,57,62,.18); }

    .center-card { text-align: center; }
  </style>
</head>
<body class="auth-pending">
  <div class="center-layout">
    <div class="center-card">

      <div class="welcome-success-icon" aria-hidden="true">✓</div>

      <h1 style="font-family:var(--font-head); font-size:24px; font-weight:800; color:var(--ink); letter-spacing:-.4px; margin-bottom:6px;">
        Access Granted
      </h1>

      <div class="session-badge">
        <div class="session-badge-dot" aria-hidden="true"></div>
        <span>Session active</span>
      </div>

      <p class="welcome-name" id="welcome-message" aria-label="Loading user data">
        Signed in as <strong id="user-display">…</strong>
      </p>

      <div class="welcome-divider"><span>Quick actions</span></div>

      <button type="button" id="dev-portal-btn" class="btn-secondary" style="margin-top:0;">
        🔗 Developer Portal
      </button>

      <button type="button" id="logout-btn" class="btn-signout">Sign Out</button>

    </div>
  </div>

  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
