<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; form-action 'self'; base-uri 'none';">
  <title>Welcome — CARS SSO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-pending">
  <div class="auth-layout">
    <div class="auth-card auth-card--centered">
<div class="step-label">Sign In</div>
        </div>
        <div class="step-line done" aria-hidden="true"></div>
        <div class="step-item done" role="listitem">
          <div class="step-circle">✓</div>
          <div class="step-label">Verify</div>
        </div>
        <div class="step-line done" aria-hidden="true"></div>
        <div class="step-item active" role="listitem">
          <div class="step-circle" aria-current="step">✓</div>
          <div class="step-label">Done</div>
        </div>
      </div>

      <div class="brand-row brand-row--centered" data-stagger>
        <div class="brand-logo" aria-hidden="true">🚗</div>
        <span class="brand-name">CARS SSO</span>
      </div>

      <div class="welcome-check" aria-hidden="true" data-stagger>✓</div>

      <h1 class="page-title" data-stagger>Access <em>granted</em></h1>

      <div class="session-badge" data-stagger>
        <div class="session-dot" aria-hidden="true"></div>
        <span>Session active</span>
      </div>

      <p class="welcome-user" aria-label="Loading user…" data-stagger>
        Signed in as <strong id="user-display">…</strong>
      </p>

      <div class="action-divider" data-stagger><span>Quick actions</span></div>

      <button type="button" id="dev-portal-btn" class="btn-portal" data-stagger>
        🔗 Developer Portal
      </button>

      <button type="button" id="logout-btn" class="btn-signout" data-stagger>
        Sign Out
      </button>

    </div>
  </div>
  <script src="/effects.js"></script>
  <script src="/script.js"></script>
</body>
</html>
